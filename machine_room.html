<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIT | Campus Tour</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Open+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
    --uit-teal: #007684;
    --white: #ffffff;
    --text-dark: #333;
    --white-alpha: rgba(255, 255, 255, 0.9);
}

body.dark-mode {
    --uit-teal: #00d4aa;
    --white: #0f172a;
    --text-dark: #f1f5f9;
    --white-alpha: rgba(15, 23, 42, 0.9);
}

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Roboto', sans-serif;
    overflow: hidden;
    transition: background-color 0.3s ease, color 0.3s ease;
}

/* Full Screen Media Background */
.tour-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    background-color: var(--white);
}

.tour-background img {
    width: 100%;
    height: 100%;
    object-fit: cover;

    /* added smooth zoom + fade */
    transition: transform 0.4s ease, opacity 0.6s ease;
}

/* Top Navigation Bar */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 40px;
    background: var(--white-alpha);
    color: var(--uit-teal);
    border-bottom: 3px solid var(--uit-teal);
    transition: background-color 0.3s ease;
}

.logo-area {
    text-align: center;
    font-weight: bold;
    line-height: 1.2;
}

.logo-area span {
    display: block;
    font-size: 0.8rem;
    letter-spacing: 2px;
}

.nav-links a {
    color: var(--uit-teal);
    text-decoration: none;
    margin-left: 25px;
    font-weight: 500;
    font-size: 0.9rem;
}

/* Floating Navigation Card */
.nav-card {
    position: absolute;
    top: 45%;
    left: 0;
    transform: translateY(-50%);
    background: var(--white-alpha);
    width: 320px;
    box-shadow: 2px 0 15px rgba(0,0,0,0.1);
    transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease;
    z-index: 5;
    border-radius: 3px;
}

.nav-card.hidden { left: -320px; }
.card-header {
    padding: 20px 25px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.card-header h1 {
    margin: 0;
    font-size: 1.2rem;
    color: var(--text-dark);
    font-family: 'Montserrat', sans-serif;
}

.nav-item {
    padding: 15px 25px;
    display: flex;
    align-items: center;
    gap: 15px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    color: var(--text-dark);
}

.icon-circle {
    width: 35px;
    height: 35px;
    border: 1.5px solid var(--uit-teal);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--uit-teal);
}

/* Toggle Button */
.card-toggle {
    position: absolute;
    right: -25px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--white);
    color: var(--uit-teal);
    width: 25px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0 5px 5px 0;
    cursor: pointer;
    box-shadow: 2px 0 5px rgba(0,0,0,0.1);
}

/* hidden state */
.nav-card.hidden{
    left:-320px;
}

.location-pin {
    position: absolute;
    top: 140px;
    right: 40px;
    background: var(--uit-teal);
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}
 .hotspot-layer {
     position: fixed;
     inset: 0;
     pointer-events: none;
     z-index: 2;
 }
 .hotspot {
     position: absolute;
     width: 22px;
     height: 22px;
     background: var(--uit-teal);
     border-radius: 50%;
     box-shadow: 0 0 0 8px rgba(0,118,132,0.15);
     display: flex;
     align-items: center;
     justify-content: center;
     color: #fff;
     font-size: 12px;
     pointer-events: auto;
     cursor: pointer;
     transition: transform 0.2s ease;
 }
 .hotspot:hover {
     transform: scale(1.1);
 }
 .tooltip {
     position: absolute;
     min-width: 180px;
     max-width: 280px;
     background: rgba(255,255,255,0.95);
     color: var(--text-dark);
     border: 1px solid #e5e7eb;
     border-radius: 8px;
     box-shadow: 0 8px 24px rgba(0,0,0,0.12);
     padding: 10px 12px;
     font-size: 0.9rem;
     transform: translate(-50%, -120%);
     z-index: 3;
 }
 .audioguide {
     position: fixed;
     left: 20px;
     bottom: 20px;
     background: rgba(255,255,255,0.9);
     border: 1px solid #e5e7eb;
     border-radius: 10px;
     box-shadow: 0 8px 24px rgba(0,0,0,0.10);
     padding: 10px;
     display: flex;
     gap: 10px;
     z-index: 4;
 }
 .audioguide button {
     background: var(--uit-teal);
     color: #fff;
     border: none;
     border-radius: 8px;
     padding: 8px 12px;
     cursor: pointer;
     font-weight: 600;
 }
 .audioguide button.stop {
     background: #555;
 }
</style>
</head>

<body>

    <header style="padding:30px">
        <a href = "category.html" style="text-decoration:none;color:inherit;">
            <div style="border:1px solid #333;padding:5px 15px;">← Back</div>
        </a>

        <div class="logo-area">
        UNIVERSITY OF INFORMATION TECHNOLOGY<br>
        <span>UIT</span>
        </div>

            <div class="nav-links">
            <a href="https://www.uit.edu.mm/">Apply Now →</a>
            </div>
        </header>

    <div class="location-pin">📍</div>

    <div class="tour-background">
        <img id="tourImg" src="images/mroom1.jpg">
    </div>
    <div id="hotspotLayer" class="hotspot-layer"></div>
    <div class="audioguide">
        <button id="narrateBtn">🔊 Narrate</button>
        <button id="stopBtn" class="stop">⏹ Stop</button>
    </div>

    <div class="nav-card" id="navCard">

    <div class="card-header">
        <h1 id="currentLocation">UIT Computer Labs</h1>
         <span>Building 2</span>
    </div>

    <div class="nav-item" onclick="changeLocation('Room 436','images/mroom2.jpg')">
        <div class="icon-circle">M</div>
        <div>Classroom R-232</div>
    </div>

    <div class="nav-item" onclick="changeLocation('Room 434','images/mroom3.jpg')">
        <div class="icon-circle">M</div>
        <div>Classroom R-233</div>
    </div>

    <div class="nav-item" onclick="changeLocation('Room 434','images/mroom1.jpg')">
        <div class="icon-circle">M</div>
        <div>Classroom R-234</div>
    </div>

    <div class="card-toggle" onclick="toggleCard()">‹</div>

    </div>
    

<script>
// Apply dark mode immediately if set
if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark-mode');
}

// Mark as visited
localStorage.setItem('visited_computer_lab', 'true');

/* IMAGE ZOOM */
let scale = 1
const img = document.getElementById("tourImg")

window.addEventListener("wheel", function(e){

    if(e.deltaY < 0){
        scale += 0.3
        }else{
        scale -= 0.3
    }

    scale = Math.min(Math.max(1,scale),1.3)

    img.style.transform = "scale("+scale+")"

})

/* CHANGE IMAGE */

function changeLocation(name,src){

    const img = document.getElementById("tourImg")
    const text = document.getElementById("currentLocation")

    img.style.opacity = 0

    setTimeout(()=>{

        img.src = src
        text.innerText = name
        scale = 1
        img.style.transform = "scale(1)"
        img.style.opacity = 1

    },400)

}

/* TOGGLE CARD */

function toggleCard(){

    const card = document.getElementById("navCard")

    card.classList.toggle("hidden")

}

const hotspotLayer = document.getElementById("hotspotLayer")
const hotspotsData = {
  "images/mroom1.jpg": [
    { x: "30%", y: "55%", text: "High-performance student workstations" },
    { x: "65%", y: "50%", text: "Ergonomic seating for collaborative learning" }
  ],
  "images/mroom2.jpg": [
    { x: "35%", y: "58%", text: "Desktop computers for lab exercises" },
    { x: "70%", y: "48%", text: "Student workspace for programming projects" }
  ],
  "images/mroom3.jpg": [
    { x: "40%", y: "56%", text: "Teaching assistant station and projector setup" },
    { x: "72%", y: "52%", text: "Shared resources for group assignments" }
  ]
}

function renderHotspots(src){
  hotspotLayer.innerHTML = ""
  const list = hotspotsData[src] || []
  list.forEach(h => {
    const spot = document.createElement("div")
    spot.className = "hotspot"
    spot.style.left = h.x
    spot.style.top = h.y
    const tooltip = document.createElement("div")
    tooltip.className = "tooltip"
    tooltip.textContent = h.text
    tooltip.style.display = "none"
    spot.appendChild(tooltip)
    spot.addEventListener("mouseenter", ()=>{ tooltip.style.display = "block" })
    spot.addEventListener("mouseleave", ()=>{ tooltip.style.display = "none" })
    spot.addEventListener("click", ()=>{
      tooltip.style.display = tooltip.style.display === "none" ? "block" : "none"
    })
    hotspotLayer.appendChild(spot)
  })
}

const descriptions = {
  "images/mroom1.jpg": "This computer classroom provides students with high-performance workstations for practical coding and multimedia projects.",
  "images/mroom2.jpg": "This lab space is equipped with desktop computers and high-speed internet, ideal for web development and software engineering classes.",
  "images/mroom3.jpg": "This modern classroom features collaborative seating and dual-monitor setups to support team-based learning and advanced IT training."
}

function narrate(src){
  const text = descriptions[src] || "Welcome to UIT machine rooms."
  window.speechSynthesis.cancel()
  const utter = new SpeechSynthesisUtterance(text)
  utter.lang = "en-US"
  window.speechSynthesis.speak(utter)
}

document.getElementById("narrateBtn").addEventListener("click", ()=>{
  narrate(document.getElementById("tourImg").getAttribute("src"))
})

document.getElementById("stopBtn").addEventListener("click", ()=>{
  window.speechSynthesis.cancel()
})

renderHotspots(document.getElementById("tourImg").getAttribute("src"))

</script>

</body>
</html>
