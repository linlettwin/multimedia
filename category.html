<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Color Variables */
        :root {
            --uit-teal: #007684;
            --white: #ffffff;
            --text-dark: #333;
            --bg-overlay: rgba(0, 0, 0, 0.4);
            --header-bg: rgba(255, 255, 255, 0.95);
        }

        body.dark-mode {
            --uit-teal: #00d4aa;
            --white: #0f172a;
            --text-dark: #f1f5f9;
            --bg-overlay: rgba(0, 0, 0, 0.7);
            --header-bg: rgba(15, 23, 42, 0.95);
        }

        body, html {
            margin: 0;
            padding: 0;
             font-family: 'Open Sans', sans-serif;
            color: var(--text-dark);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            opacity: 0;              /* start hidden */
            transition: opacity 1.0s ease-in-out, background-color 0.3s ease; /* smooth fade-in */
            background-color: var(--white);
            }

            body.loaded {
                opacity: 1;              /* fully visible */
            }

        /* Hero Background Section */
        .hero-section {
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('images/outside.jpg'); /* Replace with UIT campus photo */
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Header Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background: var(--header-bg);
            color: var(--uit-teal);
            border-bottom: 3px solid var(--uit-teal);
            transition: background-color 0.3s ease;
        }

        .logo-area {
            text-align: center;
            font-weight: bold;
            line-height: 1.2;
        }

        .logo-area span {
            display: block;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .nav-links a {
            color: var(--uit-teal);
            text-decoration: none;
            margin-left: 25px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Main Heading */
        .title-container {
            text-align: center;
            margin-top: 60px;
            margin-bottom: 40px;
            color: #ffffff; /* keep white on hero background */
        }

        .title-container h1 {
            font-size: 3rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .title-container p {
            font-size: 1.2rem;
            font-weight: 300;
        }

        /* Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Card Styling */
        .card {
            background: var(--header-bg);
            border-bottom: 6px solid var(--uit-teal);
            transition: transform 0.3s ease, background-color 0.3s ease;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card {
                opacity: 0;
                transform: translateY(20px);
                transition: opacity 0.8s ease, transform 0.8s ease;
            }

         .card.visible {
                opacity: 1;
                transform: translateY(0);
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-image {
            width: 100%;
            height: 180px;
            background-size: cover;
            background-position: center;
        }

        .card-content {
            padding: 20px;
            color: var(--uit-teal);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-weight: 500;
            font-size: 1.1rem;
        }

        .card-underline {
            width: 30px;
            height: 3px;
            background-color: var(--uit-teal);
            margin-top: 10px;
        }

        /* Icon Placeholders */
        .icon {
            font-size: 1.2rem;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .title-container h1 { font-size: 2rem; }
            .nav-links { display: none; } /* Simplified for mobile */
        }
    </style>
</head>

    <script>
    // Apply dark mode immediately if set
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
    }

    // Fade in the whole page
    window.addEventListener('load', () => {
        document.body.classList.add('loaded');

        // Optional: stagger card animations
        const cards = document.querySelectorAll('.card');
        cards.forEach((card, index) => {
            setTimeout(() => {
                card.classList.add('visible');
            }, index * 150); // 150ms delay between cards
        });
    });
</script>
